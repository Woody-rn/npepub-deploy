services:
  nginx:
    image: nginx:stable-alpine
    container_name: npepub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started

  backend:
    image: ghcr.io/woody-rn/npepub-backend:latest
    container_name: npepub-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-npepub}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db

  frontend:
    image: ghcr.io/woody-rn/npepub-frontend:latest
    container_name: npepub-frontend
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    container_name: npepub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-npepub}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: npepub_pgdata