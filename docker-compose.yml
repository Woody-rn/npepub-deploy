services:
  backend:
    image: ghcr.io/woody-rn/npepub-backend:latest
    container_name: npepub-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/npepub
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/woody-rn/npepub-frontend:latest
    container_name: npepub-frontend
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    container_name: npepub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: npepub
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d npepub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: npepub_pg_data